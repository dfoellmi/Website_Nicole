<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nicole Sterki</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="75" font-size="78">♡</text></svg>'>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <section class="hero" id="intro">
      <p class="badge">nsterki.ch</p>
      <h1>Nicole Sterki</h1>
      <p class="lead">Ein kleines Quiz. Ein paar richtige Antworten. Und am Ende wartet ein Code.</p>
      <button id="start-button" type="button">Quiz starten</button>
    </section>

    <section class="quiz hidden" id="quiz" aria-live="polite">
      <div class="topline">
        <span id="progress">Frage 1 von 5</span>
        <span>Code: ???</span>
      </div>

      <h2 id="question">Frage</h2>
      <div class="answers" id="answers"></div>
      <p class="feedback" id="feedback"></p>
    </section>

    <section class="result hidden" id="result">
      <p class="badge">Geschafft</p>
      <h2>Der Code lautet</h2>
      <div class="code">021</div>
      <p class="lead">Gut gemacht, Nicole. Diesen Code solltest du dir merken.</p>
      <button id="again-button" type="button">Nochmal spielen</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
